name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: Windows
          - platform: ubuntu-22.04
            name: Ubuntu

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Set version from tag
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node -e "
            const fs = require('fs');
            const v = process.env.VERSION;

            // MSI requires numeric-only pre-release: convert e.g. '1.0.0-rc03' -> '1.0.3'
            function toMsiVersion(raw) {
              const m = raw.match(/^(\d+)\.(\d+)\.(\d+)(?:-[a-z]+(\d+))?$/i);
              if (!m) return raw;
              const [, maj, min, patch, pre] = m;
              return pre ? maj + '.' + min + '.' + pre : maj + '.' + min + '.' + patch;
            }
            const msiV = toMsiVersion(v);

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = msiV;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');

            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \"[^\"]*\"/m, 'version = \"' + msiV + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);

            console.log('Tag version:', v, '| Build version:', msiV);
          "

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Print Gest ${{ github.ref_name }}
          releaseBody: |
            ## 📦 Téléchargements

            | Plateforme | Fichier | Type |
            |---|---|---|
            | Windows | `.msi` | Installeur |
            | Windows | `_x64-setup.exe` | NSIS installeur |
            | Ubuntu | `.deb` | Paquet Debian |
            | Ubuntu | `.AppImage` | Portable |
          releaseDraft: true
          prerelease: false
